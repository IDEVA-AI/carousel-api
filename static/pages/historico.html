<div class="section-label">Carrosseis gerados</div>
<div class="section-title">Historico</div>

<div class="table-wrap" id="histTable">
  <div style="padding:40px;text-align:center;color:var(--muted);font-size:13px;">Carregando...</div>
</div>

<!-- LIGHTBOX -->
<div id="histLightbox" style="display:none;position:fixed;inset:0;background:rgba(14,12,10,.95);z-index:1000;align-items:center;justify-content:center;flex-direction:column;gap:20px;" onclick="closeHistLb(event)">
  <div style="position:absolute;top:20px;right:28px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);cursor:pointer;" onclick="closeHistLb()">ESC / fechar</div>
  <div id="histLbSlides" style="display:flex;gap:16px;overflow-x:auto;max-width:90vw;padding:20px;"></div>
  <div style="display:flex;gap:12px;">
    <button class="btn btn-outline" id="histLbDownload">Baixar ZIP</button>
  </div>
</div>

<script>
async function loadHistorico() {
  try {
    const r = await fetch('/historico');
    const d = await r.json();
    const items = d.historico || [];

    if (!items.length) {
      document.getElementById('histTable').innerHTML = '<div style="padding:60px;text-align:center;color:var(--muted);font-size:13px;">Nenhum carrossel gerado ainda</div>';
      return;
    }

    const header = `<div class="table-header">
      <div style="flex:0 0 64px;"></div>
      <div style="flex:2;">Titulo</div>
      <div style="flex:1;">Pilar</div>
      <div style="flex:0 0 60px;">Slides</div>
      <div style="flex:1;">Data</div>
      <div style="flex:0 0 80px;"></div>
    </div>`;

    const rows = items.map(it => `
      <div class="table-row" onclick="openHistItem('${it.id}')">
        ${it.thumbnail ? `<img class="table-thumb" src="${it.thumbnail}" alt="">` : '<div class="table-thumb" style="background:var(--dark3);"></div>'}
        <div class="table-col" style="flex:2;font-family:'Fraunces',serif;font-weight:700;font-size:14px;">${it.titulo || 'Carrossel'}</div>
        <div class="table-col gold" style="flex:1;">${it.pilar || ''}</div>
        <div class="table-col muted" style="flex:0 0 60px;text-align:center;">${it.total_slides}</div>
        <div class="table-col muted" style="flex:1;">${formatDate(it.timestamp)}</div>
        <div style="flex:0 0 80px;display:flex;gap:8px;">
          <button class="btn btn-outline" style="padding:4px 10px;font-size:9px;" onclick="event.stopPropagation();deleteHist('${it.id}')">Del</button>
        </div>
      </div>`).join('');

    document.getElementById('histTable').innerHTML = header + rows;
  } catch(e) {
    document.getElementById('histTable').innerHTML = '<div style="padding:20px;color:#e85050;">Erro ao carregar historico</div>';
  }
}

async function openHistItem(id) {
  try {
    const r = await fetch('/historico/' + id);
    const d = await r.json();
    const previews = d.previews || [];

    const lb = document.getElementById('histLightbox');
    const slides = document.getElementById('histLbSlides');
    slides.innerHTML = previews.map((src, i) => `
      <img src="${src.startsWith('data:') ? src : 'data:image/png;base64,' + src}"
        alt="Slide ${i+1}" style="height:70vh;max-height:600px;border:1px solid var(--border);border-radius:4px;">
    `).join('');
    lb.style.display = 'flex';
  } catch(e) {
    alert('Erro ao carregar carrossel');
  }
}

function closeHistLb(e) {
  if (e && e.target !== document.getElementById('histLightbox')) return;
  document.getElementById('histLightbox').style.display = 'none';
}

async function deleteHist(id) {
  if (!confirm('Deletar este carrossel?')) return;
  await fetch('/historico/' + id, {method: 'DELETE'});
  loadHistorico();
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'2-digit'}) + ' ' +
      d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  } catch { return iso || ''; }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeHistLb();
});

loadHistorico();
</script>
