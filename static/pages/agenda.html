<div class="section-label">Agendamento</div>
<div class="section-title">Agenda</div>

<div style="display:flex;gap:24px;flex-wrap:wrap;">

  <!-- PAINEL DE AGENDAMENTO -->
  <div style="flex:1;min-width:400px;">
    <div class="section-label">Pipeline automatico</div>
    <div class="table-wrap" style="padding:24px;">

      <!-- TOGGLE MASTER -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);">
        <div>
          <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:700;">Postagem automatica</div>
          <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px;" id="schedStatus">Carregando...</div>
        </div>
        <button class="btn btn-gold" id="btnToggleSched" onclick="toggleScheduler()">Ativar</button>
      </div>

      <!-- JOBS -->
      <div id="jobsList"></div>

      <!-- ADD JOB -->
      <button class="btn btn-outline btn-full" style="padding:12px;margin-top:16px;" onclick="addJob()">+ Adicionar horario</button>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
        <button class="btn btn-gold btn-full" style="padding:14px;" onclick="saveSchedule()">Salvar configuracao</button>
        <div id="saveStatus" style="margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);"></div>
      </div>
    </div>
  </div>

  <!-- LOGS -->
  <div style="flex:1;min-width:300px;">
    <div class="section-label">Ultimas execucoes</div>
    <div class="table-wrap" id="logsArea">
      <div style="padding:32px;text-align:center;color:var(--muted);font-size:13px;">Carregando...</div>
    </div>

    <div style="margin-top:20px;">
      <div class="section-label">Execucao manual</div>
      <div style="display:flex;gap:8px;">
        <select id="manualEstilo" class="fi" style="flex:1;">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="ferrugem">Ferrugem</option>
        </select>
        <button class="btn btn-gold" id="btnManual" onclick="runManual()">Executar agora</button>
      </div>
      <div id="manualResult" style="margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);"></div>
    </div>
  </div>

</div>

<script>
let schedConfig = { ativo: false, jobs: [] };

async function loadSchedule() {
  try {
    const r = await fetch('/api/scheduler');
    const d = await r.json();
    schedConfig = { ativo: d.ativo, jobs: d.jobs || [] };

    // Toggle button
    const btn = document.getElementById('btnToggleSched');
    if (d.ativo) {
      btn.textContent = 'Desativar';
      btn.className = 'btn btn-outline';
      document.getElementById('schedStatus').textContent = `Ativo — ${d.jobs.filter(j=>j.ativo).length} horarios configurados`;
    } else {
      btn.textContent = 'Ativar';
      btn.className = 'btn btn-gold';
      document.getElementById('schedStatus').textContent = 'Desativado';
    }

    renderJobs();
    renderLogs(d.logs || []);
  } catch(e) {
    document.getElementById('schedStatus').textContent = 'Erro ao carregar';
  }
}

function renderJobs() {
  const area = document.getElementById('jobsList');
  if (!schedConfig.jobs.length) {
    area.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">Nenhum horario configurado</div>';
    return;
  }

  const tipoOpts = [
    {v:'auto',l:'Auto (trending)'},
    {v:'provocacao',l:'Provocacao'},
    {v:'diagnostico',l:'Diagnostico'},
    {v:'framework',l:'Framework'},
    {v:'dado',l:'Dado/Estatistica'},
    {v:'mito_vs_realidade',l:'Mito vs Realidade'},
    {v:'historia',l:'Historia/Case'},
    {v:'opiniao',l:'Opiniao forte'},
    {v:'checklist',l:'Checklist/How-to'},
    {v:'noticia',l:'Noticia adaptada'},
    {v:'cta_direto',l:'CTA direto'},
  ];
  area.innerHTML = schedConfig.jobs.map((job, i) => {
    const tipoSelect = tipoOpts.map(o => `<option value="${o.v}" ${(job.tipo_conteudo||'auto')===o.v?'selected':''}>${o.l}</option>`).join('');
    return `
    <div style="padding:14px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <input type="checkbox" ${job.ativo ? 'checked' : ''} onchange="schedConfig.jobs[${i}].ativo=this.checked" style="accent-color:var(--gold);">
        <input type="time" value="${job.hora}" onchange="schedConfig.jobs[${i}].hora=this.value" class="fi fi-mono" style="width:100px;">
        <select onchange="schedConfig.jobs[${i}].estilo=this.value" class="fi" style="flex:1;">
          <option value="dark" ${job.estilo==='dark'?'selected':''}>Dark</option>
          <option value="light" ${job.estilo==='light'?'selected':''}>Light</option>
          <option value="ferrugem" ${job.estilo==='ferrugem'?'selected':''}>Ferrugem</option>
        </select>
        <select onchange="schedConfig.jobs[${i}].visual=this.value" class="fi" style="flex:1;">
          <option value="none" ${job.visual==='none'?'selected':''}>Limpo</option>
          <option value="editorial" ${job.visual==='editorial'?'selected':''}>Editorial</option>
        </select>
        <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;" onclick="removeJob(${i})">&#10005;</button>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding-left:30px;">
        <span class="fl" style="white-space:nowrap;">TIPO:</span>
        <select onchange="schedConfig.jobs[${i}].tipo_conteudo=this.value" class="fi" style="flex:1;">${tipoSelect}</select>
      </div>
    </div>`;
  }).join('');
}

function addJob() {
  schedConfig.jobs.push({ hora: '12:00', estilo: 'dark', visual: 'editorial', slides: 7, ativo: true, tipo_conteudo: 'auto' });
  renderJobs();
}

function removeJob(i) {
  schedConfig.jobs.splice(i, 1);
  renderJobs();
}

async function saveSchedule() {
  try {
    await fetch('/api/scheduler/config', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(schedConfig)
    });
    document.getElementById('saveStatus').textContent = 'Salvo e aplicado!';
    setTimeout(() => document.getElementById('saveStatus').textContent = '', 3000);
    loadSchedule();
  } catch(e) {
    document.getElementById('saveStatus').textContent = 'Erro ao salvar';
  }
}

async function toggleScheduler() {
  const endpoint = schedConfig.ativo ? '/api/scheduler/stop' : '/api/scheduler/start';
  await fetch(endpoint, {method:'POST'});
  loadSchedule();
}

function renderLogs(logs) {
  const area = document.getElementById('logsArea');
  if (!logs.length) {
    area.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted);font-size:13px;">Nenhuma execucao registrada</div>';
    return;
  }
  area.innerHTML = logs.map(log => {
    const badge = log.status === 'success' ? 'badge-ok' : 'badge-err';
    const label = log.status === 'success' ? 'OK' : 'ERRO';
    const date = new Date(log.timestamp);
    const time = date.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    const day = date.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'});
    return `<div class="table-row" style="cursor:default;">
      <div style="flex:0 0 60px;"><span class="badge ${badge}">${label}</span></div>
      <div style="flex:1;font-size:12px;color:var(--paper);">${log.titulo || log.error || '—'}</div>
      <div style="flex:0 0 50px;font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);">${log.estilo}</div>
      <div style="flex:0 0 80px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);">${day} ${time}</div>
    </div>`;
  }).join('');
}

async function runManual() {
  const btn = document.getElementById('btnManual');
  const res = document.getElementById('manualResult');
  const estilo = document.getElementById('manualEstilo').value;
  btn.disabled = true;
  btn.textContent = 'Executando...';
  res.textContent = 'Pipeline rodando — pode levar 1-2 minutos...';

  try {
    const r = await fetch('/pipeline/executar', {method:'POST'});
    const d = await r.json();
    if (d.status === 'success') {
      res.innerHTML = '<span style="color:#2ecc71;">Sucesso! ' + (d.permalink || '') + '</span>';
    } else {
      res.innerHTML = '<span style="color:#e85050;">Erro: ' + (d.error || 'desconhecido') + '</span>';
    }
    loadSchedule(); // refresh logs
  } catch(e) {
    res.innerHTML = '<span style="color:#e85050;">Erro: ' + e.message + '</span>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Executar agora';
  }
}

loadSchedule();
</script>
