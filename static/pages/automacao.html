<div class="section-label">Instagram Automation</div>
<div class="section-title">Automacao</div>

<!-- TABS -->
<div style="display:flex;gap:4px;margin-bottom:24px;flex-wrap:wrap;" id="autoTabs">
  <button class="btn btn-gold" data-tab="keywords" onclick="switchAutoTab('keywords')">Keywords</button>
  <button class="btn btn-outline" data-tab="sequences" onclick="switchAutoTab('sequences')">DM Sequences</button>
  <button class="btn btn-outline" data-tab="leads" onclick="switchAutoTab('leads')">Leads</button>
  <button class="btn btn-outline" data-tab="analytics" onclick="switchAutoTab('analytics')">Analytics</button>
  <button class="btn btn-outline" data-tab="logs" onclick="switchAutoTab('logs')">Logs</button>
</div>

<div id="autoContent"></div>

<script>
let autoTab = 'keywords';

function switchAutoTab(tab) {
  autoTab = tab;
  document.querySelectorAll('#autoTabs button').forEach(b => {
    b.className = b.dataset.tab === tab ? 'btn btn-gold' : 'btn btn-outline';
  });
  loadAutoTab();
}

async function loadAutoTab() {
  const area = document.getElementById('autoContent');
  area.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);">Carregando...</div>';

  if (autoTab === 'keywords') await renderKeywords(area);
  else if (autoTab === 'sequences') await renderSequences(area);
  else if (autoTab === 'leads') await renderLeads(area);
  else if (autoTab === 'analytics') await renderAnalytics(area);
  else if (autoTab === 'logs') await renderLogs(area);
}

// ─── KEYWORDS ──────────────────────────────────────────
let kwData = [];
async function renderKeywords(area) {
  try {
    const r = await fetch('/api/automation/keywords');
    const d = await r.json();
    kwData = d.keywords || [];
    const ss = 'background:rgba(244,240,232,.04);border:1px solid var(--border);color:var(--paper);padding:8px 12px;font-family:"DM Sans",sans-serif;font-size:13px;border-radius:4px;width:100%;outline:none;';

    area.innerHTML = `
      <div class="section-label">Palavras-chave de gatilho</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">
        Quando alguem comenta uma dessas palavras, o sistema responde e envia DM automaticamente.
      </div>
      <div id="kwList">
        ${kwData.map((kw,i) => `
        <div class="card" style="cursor:default;margin-bottom:12px;">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <input type="checkbox" ${kw.ativo?'checked':''} onchange="kwData[${i}].ativo=this.checked" style="accent-color:var(--gold);">
            <input type="text" value="${esc(kw.keyword)}" onchange="kwData[${i}].keyword=this.value" style="${ss}max-width:150px;font-family:'DM Mono',monospace;font-weight:700;color:var(--gold);" placeholder="KEYWORD">
            <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;margin-left:auto;" onclick="kwData.splice(${i},1);renderKeywords(document.getElementById('autoContent'))">&#10005;</button>
          </div>
          <div style="margin-bottom:8px;">
            <label style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:4px;">Resposta no comentario</label>
            <input type="text" value="${esc(kw.reply||'')}" onchange="kwData[${i}].reply=this.value" style="${ss}" placeholder="Acabei de te mandar no DM!">
          </div>
          <div>
            <label style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:4px;">Sequencia de DM vinculada</label>
            <input type="text" value="${esc(kw.dm_sequence||'')}" onchange="kwData[${i}].dm_sequence=this.value" style="${ss}" placeholder="diagnostico_gratis">
          </div>
        </div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-outline" style="flex:1;padding:14px;" onclick="kwData.push({keyword:'',reply:'',dm_sequence:'',ativo:true});renderKeywords(document.getElementById('autoContent'))">+ Adicionar keyword</button>
        <button class="btn btn-gold" style="flex:1;padding:14px;" onclick="saveKeywords()">Salvar keywords</button>
      </div>
      <div id="kwStatus" style="margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);"></div>`;
  } catch(e) { area.innerHTML = '<div style="color:#e85050;">Erro ao carregar</div>'; }
}
async function saveKeywords() {
  await fetch('/api/automation/keywords',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords:kwData})});
  document.getElementById('kwStatus').textContent='Salvo!';
  setTimeout(()=>{const el=document.getElementById('kwStatus');if(el)el.textContent='';},3000);
}

// ─── SEQUENCES ──────────────────────────────────────────
let seqData = [];
async function renderSequences(area) {
  try {
    const r = await fetch('/api/dm/sequences');
    const d = await r.json();
    seqData = d.sequences || [];
    const ss = 'background:rgba(244,240,232,.04);border:1px solid var(--border);color:var(--paper);padding:8px 12px;font-family:"DM Sans",sans-serif;font-size:13px;border-radius:4px;width:100%;outline:none;';
    const lbl = 'font-family:"DM Mono",monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:4px;';

    area.innerHTML = `
      <div class="section-label">Sequencias de DM</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">Mini-funis automaticos. Cada sequencia envia mensagens com delay configuravel.</div>
      ${seqData.map((seq,si) => `
        <div class="card" style="cursor:default;margin-bottom:16px;">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
            <input type="checkbox" ${seq.ativo?'checked':''} onchange="seqData[${si}].ativo=this.checked" style="accent-color:var(--gold);">
            <div style="flex:1;">
              <div style="display:flex;gap:8px;margin-bottom:6px;">
                <input type="text" value="${esc(seq.nome||'')}" onchange="seqData[${si}].nome=this.value" style="${ss}font-family:'Fraunces',serif;font-weight:700;" placeholder="Nome da sequencia">
              </div>
              <div style="display:flex;gap:8px;">
                <div style="flex:1;"><label style="${lbl}">ID</label><input type="text" value="${esc(seq.id||'')}" onchange="seqData[${si}].id=this.value" style="${ss}font-family:'DM Mono',monospace;font-size:11px;" placeholder="id_sequencia"></div>
                <div style="flex:1;"><label style="${lbl}">Keyword trigger</label><input type="text" value="${esc(seq.trigger_keyword||'')}" onchange="seqData[${si}].trigger_keyword=this.value" style="${ss}font-family:'DM Mono',monospace;color:var(--gold);" placeholder="SISTEMA"></div>
              </div>
            </div>
            <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;" onclick="seqData.splice(${si},1);renderSequences(document.getElementById('autoContent'))">&#10005;</button>
          </div>
          <div style="border-top:1px solid var(--border);padding-top:12px;">
            <label style="${lbl}">Mensagens da sequencia</label>
            ${(seq.steps||[]).map((step,j) => `
              <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;">
                <input type="number" value="${step.delay_minutes||0}" onchange="seqData[${si}].steps[${j}].delay_minutes=parseInt(this.value)" style="${ss}max-width:70px;text-align:center;" title="Delay em minutos (0=imediata, 1440=24h)">
                <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);padding-top:10px;white-space:nowrap;">min</span>
                <textarea onchange="seqData[${si}].steps[${j}].message=this.value" rows="2" style="${ss}resize:vertical;">${esc(step.message||'')}</textarea>
                <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;" onclick="seqData[${si}].steps.splice(${j},1);renderSequences(document.getElementById('autoContent'))">&#10005;</button>
              </div>`).join('')}
            <button class="btn btn-outline" style="width:100%;padding:8px;font-size:10px;margin-top:4px;" onclick="seqData[${si}].steps.push({delay_minutes:0,message:''});renderSequences(document.getElementById('autoContent'))">+ Adicionar mensagem</button>
          </div>
        </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn btn-outline" style="flex:1;padding:14px;" onclick="seqData.push({id:'nova_'+Date.now(),nome:'Nova Sequencia',trigger_keyword:'',ativo:true,steps:[{delay_minutes:0,message:''}]});renderSequences(document.getElementById('autoContent'))">+ Nova sequencia</button>
        <button class="btn btn-gold" style="flex:1;padding:14px;" onclick="saveSequences()">Salvar sequencias</button>
      </div>
      <div id="seqStatus" style="margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);"></div>`;
  } catch(e) { area.innerHTML = '<div style="color:#e85050;">Erro ao carregar</div>'; }
}
async function saveSequences() {
  await fetch('/api/dm/sequences',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sequences:seqData})});
  document.getElementById('seqStatus').textContent='Salvo!';
  setTimeout(()=>{const el=document.getElementById('seqStatus');if(el)el.textContent='';},3000);
}

// ─── LEADS ──────────────────────────────────────────
async function renderLeads(area) {
  try {
    const r = await fetch('/api/leads');
    const d = await r.json();
    const leads = d.leads || [];

    if (!leads.length) {
      area.innerHTML = '<div style="padding:60px;text-align:center;color:var(--muted);">Nenhum lead registrado ainda. Leads aparecem quando pessoas interagem com seus posts.</div>';
      return;
    }

    const header = '<div class="table-header"><div style="flex:1;">Username</div><div style="flex:0 0 80px;">Score</div><div style="flex:0 0 80px;">Status</div><div style="flex:1;">Ultima interacao</div></div>';
    const rows = leads.map(l => {
      const badge = l.status==='quente'?'badge-ok':l.status==='morno'?'badge-wait':'badge-err';
      return `<div class="table-row" style="cursor:default;">
        <div style="flex:1;font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);">@${l.username}</div>
        <div style="flex:0 0 80px;font-family:'Fraunces',serif;font-size:20px;font-weight:900;color:var(--paper);">${l.score}</div>
        <div style="flex:0 0 80px;"><span class="badge ${badge}">${l.status}</span></div>
        <div style="flex:1;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);">${formatDate(l.last_seen)}</div>
      </div>`;
    }).join('');

    area.innerHTML = `<div class="section-label">Leads por engajamento</div>
      <div class="table-wrap">${header}${rows}</div>`;
  } catch(e) { area.innerHTML = '<div style="color:#e85050;">Erro ao carregar</div>'; }
}

// ─── ANALYTICS ──────────────────────────────────────────
async function renderAnalytics(area) {
  try {
    const r = await fetch('/api/analytics');
    const d = await r.json();
    const profile = d.profile || {};
    const posts = d.posts || [];

    const avgEng = d.avg_engagement ? d.avg_engagement.toFixed(1) : '0';

    area.innerHTML = `
      <div class="cards-grid">
        <div class="card" style="cursor:default;">
          <div class="card-label">Seguidores</div>
          <div class="card-value">${profile.followers || '—'}</div>
        </div>
        <div class="card" style="cursor:default;">
          <div class="card-label">Total posts</div>
          <div class="card-value">${profile.posts || '—'}</div>
        </div>
        <div class="card" style="cursor:default;">
          <div class="card-label">Engajamento medio</div>
          <div class="card-value">${avgEng}</div>
          <div class="card-sub">likes + comments por post</div>
        </div>
      </div>
      <div class="section-label" style="margin-top:24px;">Performance dos posts</div>
      <div class="table-wrap">
        <div class="table-header">
          <div style="flex:2;">Post</div>
          <div style="flex:0 0 60px;">Likes</div>
          <div style="flex:0 0 60px;">Comments</div>
          <div style="flex:0 0 80px;">Tipo</div>
          <div style="flex:1;">Data</div>
        </div>
        ${posts.map(p => `
          <div class="table-row" ${p.permalink?`onclick="window.open('${p.permalink}','_blank')"`:''}>
            <div style="flex:2;font-size:12px;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.caption || 'Sem legenda'}</div>
            <div style="flex:0 0 60px;font-family:'Fraunces',serif;font-weight:700;color:var(--paper);">${p.likes}</div>
            <div style="flex:0 0 60px;font-family:'Fraunces',serif;font-weight:700;color:var(--paper);">${p.comments}</div>
            <div style="flex:0 0 80px;"><span class="badge badge-wait">${p.type==='VIDEO'?'Reel':p.type==='CAROUSEL_ALBUM'?'Carousel':'Image'}</span></div>
            <div style="flex:1;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);">${formatDate(p.timestamp)}</div>
          </div>`).join('')}
      </div>`;
  } catch(e) { area.innerHTML = '<div style="color:#e85050;">Erro ao carregar analytics</div>'; }
}

// ─── LOGS ──────────────────────────────────────────
async function renderLogs(area) {
  try {
    const r = await fetch('/api/automation/logs');
    const d = await r.json();
    const logs = d.logs || [];

    if (!logs.length) {
      area.innerHTML = '<div style="padding:60px;text-align:center;color:var(--muted);">Nenhum log de automacao ainda.</div>';
      return;
    }

    area.innerHTML = `<div class="section-label">Historico de automacoes</div>
      <div class="table-wrap">
        ${logs.slice(0,50).map(log => {
          const badge = log.type.includes('match') ? 'badge-ok' : 'badge-wait';
          return `<div class="table-row" style="cursor:default;">
            <div style="flex:0 0 120px;"><span class="badge ${badge}">${log.type.replace('comment_','')}</span></div>
            <div style="flex:0 0 100px;font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);">@${log.username||''}</div>
            <div style="flex:1;font-size:12px;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${log.text||log.keyword||''}</div>
            <div style="flex:0 0 100px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);">${formatDate(log.timestamp)}</div>
          </div>`;
        }).join('')}
      </div>`;
  } catch(e) { area.innerHTML = '<div style="color:#e85050;">Erro ao carregar logs</div>'; }
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  } catch { return iso||''; }
}

loadAutoTab();
</script>
