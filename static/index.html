<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel Manager — Julio Carvalho</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0e0c0a;
  --paper: #f4f0e8;
  --gold: #b8873a;
  --gold-light: #e8d5b0;
  --dark2: #1a1714;
  --dark3: #2a2520;
  --muted: rgba(244,240,232,0.4);
  --border: rgba(244,240,232,0.08);
  --sidebar-w: 220px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;background:var(--ink);color:var(--paper);font-family:'DM Sans',sans-serif;font-weight:300}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);background:var(--dark2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;bottom:0;left:0;z-index:100;
}
.sb-brand{padding:28px 24px 20px;border-bottom:1px solid var(--border)}
.sb-logo{font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:var(--paper)}
.sb-handle{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.05em;margin-top:2px}

.sb-nav{flex:1;padding:16px 0;overflow-y:auto}
.sb-link{
  display:flex;align-items:center;gap:14px;padding:12px 24px;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;
  cursor:pointer;transition:all .15s;text-decoration:none;border-left:3px solid transparent;
}
.sb-link:hover{color:var(--paper);background:rgba(244,240,232,.02)}
.sb-link.active{color:var(--gold);border-left-color:var(--gold);background:rgba(184,135,58,.04)}
.sb-icon{font-size:16px;width:20px;text-align:center;opacity:0.7}
.sb-link.active .sb-icon{opacity:1}

.sb-divider{height:1px;background:var(--border);margin:12px 24px}

.sb-status{padding:20px 24px;border-top:1px solid var(--border)}
.sb-status-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sb-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-status-dot.on{background:#2ecc71}
.sb-status-dot.off{background:rgba(244,240,232,.2)}
.sb-status-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em}
.sb-status-value{font-family:'DM Mono',monospace;font-size:10px;color:var(--paper);letter-spacing:.05em;margin-left:auto}

/* ── MAIN ── */
.main{flex:1;margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
.header{
  padding:16px 40px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.header-title{font-family:'Fraunces',serif;font-size:20px;font-weight:700}
.header-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}

/* ── PAGE CONTENT ── */
.page-content{flex:1;padding:40px}

/* ── CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-bottom:32px}
.card{
  background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:28px;
  cursor:pointer;transition:border-color .2s;
}
.card:hover{border-color:rgba(184,135,58,.25)}
.card-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.card-value{font-family:'Fraunces',serif;font-size:36px;font-weight:900;color:var(--paper);line-height:1}
.card-sub{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);margin-top:8px}

/* ── TABLE ── */
.table-wrap{background:var(--dark2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.table-header{display:flex;padding:14px 20px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.table-row{display:flex;padding:16px 20px;border-bottom:1px solid var(--border);align-items:center;transition:background .1s;cursor:pointer}
.table-row:hover{background:rgba(244,240,232,.02)}
.table-row:last-child{border-bottom:none}
.table-col{flex:1;font-size:13px;color:var(--paper)}
.table-col.muted{color:var(--muted)}
.table-col.gold{color:var(--gold);font-family:'DM Mono',monospace;font-size:11px}
.table-thumb{width:48px;height:64px;object-fit:cover;border:1px solid var(--border);border-radius:4px;flex-shrink:0;margin-right:16px}

/* ── BUTTONS ── */
.btn{
  padding:10px 20px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;cursor:pointer;transition:all .2s;border-radius:4px;
}
.btn-gold{background:var(--gold);color:var(--ink);border:none}
.btn-gold:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.btn-outline:hover{background:var(--gold);color:var(--ink)}

/* ── BADGE ── */
.badge{
  display:inline-block;padding:3px 10px;border-radius:12px;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;
}
.badge-ok{background:rgba(46,204,113,.12);color:#2ecc71}
.badge-wait{background:rgba(184,135,58,.12);color:var(--gold)}
.badge-err{background:rgba(220,60,60,.12);color:#e85050}

/* ── SECTION ── */
.section-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;margin-bottom:20px}
.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-header{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-align:center;padding:8px 0}
.cal-day{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);
  border-radius:6px;cursor:pointer;transition:background .15s;
}
.cal-day:hover{background:rgba(244,240,232,.04)}
.cal-day.today{color:var(--paper);font-weight:500}
.cal-day.has-post{background:rgba(184,135,58,.12);color:var(--gold)}
.cal-day.empty{cursor:default}
.cal-day.empty:hover{background:transparent}

/* ── IFRAME for criar page ── */
.page-frame{width:100%;border:none;min-height:calc(100vh - 100px)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:80px 40px;color:var(--muted)}
.empty-state-icon{font-size:48px;opacity:0.3;margin-bottom:16px}
.empty-state-text{font-family:'DM Sans',sans-serif;font-size:15px}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sb-brand">
    <div class="sb-logo">Carousel Manager</div>
    <div class="sb-handle">@j.karv</div>
  </div>

  <div class="sb-nav">
    <a class="sb-link active" data-page="dashboard" onclick="navigateTo('dashboard')">
      <span class="sb-icon">&#9632;</span> Dashboard
    </a>
    <a class="sb-link" data-page="criar" onclick="navigateTo('criar')">
      <span class="sb-icon">&#10010;</span> Criar Carrossel
    </a>
    <a class="sb-link" data-page="postagens" onclick="navigateTo('postagens')">
      <span class="sb-icon">&#9998;</span> Postagens
    </a>
    <a class="sb-link" data-page="agenda" onclick="navigateTo('agenda')">
      <span class="sb-icon">&#9776;</span> Agenda
    </a>

    <div class="sb-divider"></div>

    <a class="sb-link" data-page="historico" onclick="navigateTo('historico')">
      <span class="sb-icon">&#8635;</span> Historico
    </a>
  </div>

  <div class="sb-status">
    <div class="sb-status-row">
      <div class="sb-status-dot off" id="pipelineDot"></div>
      <span class="sb-status-label">Pipeline</span>
      <span class="sb-status-value" id="pipelineStatus">OFF</span>
    </div>
    <div class="sb-status-row">
      <div class="sb-status-dot on"></div>
      <span class="sb-status-label">API</span>
      <span class="sb-status-value">Online</span>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="header">
    <div class="header-title" id="pageTitle">Dashboard</div>
    <div class="header-tag">Carousel Manager v2.0</div>
  </div>

  <div class="page-content" id="pageContent">
    <!-- Conteudo carregado dinamicamente -->
  </div>
</div>

</div>

<script>
// ─── ROUTER ─────────────────────────────────────────────────────────────────
const PAGE_TITLES = {
  dashboard: 'Dashboard',
  criar: 'Criar Carrossel',
  postagens: 'Postagens',
  agenda: 'Agenda',
  historico: 'Historico',
};

let currentPage = null;
const pageCache = {};

async function navigateTo(page) {
  if (currentPage === page) return;
  currentPage = page;

  // Update sidebar
  document.querySelectorAll('.sb-link').forEach(l => {
    l.classList.toggle('active', l.dataset.page === page);
  });

  // Update header
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;

  // Update hash
  window.location.hash = page;

  // Load page
  const container = document.getElementById('pageContent');

  if (page === 'criar') {
    // Criar usa iframe pro index original (isolamento de JS/CSS)
    container.innerHTML = '<iframe src="/pages/criar.html" class="page-frame" id="criarFrame"></iframe>';
    return;
  }

  // Load page fragment
  try {
    if (!pageCache[page]) {
      const r = await fetch(`/pages/${page}.html`);
      if (!r.ok) throw new Error('Pagina nao encontrada');
      pageCache[page] = await r.text();
    }
    container.innerHTML = pageCache[page];

    // Execute inline scripts
    container.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      s.textContent = old.textContent;
      old.replaceWith(s);
    });
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">?</div><div class="empty-state-text">Pagina "${page}" nao encontrada</div></div>`;
  }
}

// ─── INIT ───────────────────────────────────────────────────────────────────
const hash = window.location.hash.slice(1) || 'dashboard';
navigateTo(hash);

window.addEventListener('hashchange', () => {
  const h = window.location.hash.slice(1) || 'dashboard';
  navigateTo(h);
});

// ─── STATUS ─────────────────────────────────────────────────────────────────
async function loadStatus() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    if (d.status === 'ok') {
      document.querySelector('.sb-status-dot:last-of-type').className = 'sb-status-dot on';
    }
  } catch(e) {}
}
loadStatus();
</script>
</body>
</html>
