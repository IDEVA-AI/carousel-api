version: "3.8"

services:
  app:
    image: carousel-api:latest
    environment:
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY}
      - PEXELS_API_KEY=${PEXELS_API_KEY}
      - CLAUDE_BRIDGE_URL=http://172.21.0.1:3200/generate
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
      - INSTAGRAM_BUSINESS_ACCOUNT_ID=${INSTAGRAM_BUSINESS_ACCOUNT_ID}
      - PORT=8765
    volumes:
      - carousel-historico:/app/historico
    networks:
      - network_public
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.http.routers.carousel.rule=Host(`carousel.onexos.com.br`)
        - traefik.http.routers.carousel.entrypoints=web
        - traefik.http.services.carousel.loadbalancer.server.port=8765
      resources:
        limits:
          memory: 1G

volumes:
  carousel-historico:

networks:
  network_public:
    external: true
